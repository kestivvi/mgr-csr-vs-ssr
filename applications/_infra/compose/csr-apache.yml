services:
  apache:
    build:
      context: ../../${APPLICATION_DIR}
      target: apache
    image: mgr-${APPLICATION_ID}-apache
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
      - "443:443"
      - "8060:8060"
      - "9117:9117"
    networks:
      - application-net

networks:
  application-net:
    driver: bridge
