# Test Scenario: _app_assets (C in the three-Scenario taxonomy).
#
# URL prefix: /dynamic-app/{id} — the realistic procedurally-generated 100-row page.
# Assets:     skip_assets=false — k6 refetches homepage-discovered assets on every
#             iteration. Models a worst-case cold-cache page-view.
#
# Comparison axes:
#   vs _app   → isolates asset-fetching effect at constant page.
#   vs _hello → full-picture comparison (page complexity + assets).

test_type: load
num_repetitions: 10
inter_repetition_delay: 1m

load_options:
  rps: 50
  warmup: 2m
  duration: 5m
  after: 15s
  vus: 300
  path_type: dynamic-app
  skip_assets: false
  timeout: 0.4s
