# Infrastructure Configuration Example
# You can use this file as a template for your own infra.yaml

## AWS Environment
# AWS Region
aws_region: ap-south-1
# AWS Key Pair Name
key_name: MGR-M
# Your Public IP to restrict SSH access
my_ip: 46.205.195.40/32

# Instance Types (Optional: will use defaults if omitted)
app_server_instance_type: t4g.micro
load_generator_instance_type: t4g.micro
monitoring_server_instance_type: t4g.micro

# Technologies to deploy
# These define which applications will be provisioned in the infrastructure.
technologies:
  ##########################
  # Static Site
  ##########################
  "CSR-Vanilla":
    description: "Application Server (CSR-Vanilla)"
    purpose: "Hosts Client-Side Rendered application"
    app_dir: "apps/csr-vanilla-nginx"

