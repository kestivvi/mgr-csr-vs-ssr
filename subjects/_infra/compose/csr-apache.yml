services:
  apache:
    build:
      context: ../../${SUBJECT_DIR}
      target: apache
    image: mgr-${SUBJECT_ID}-apache
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
      - "443:443"
      - "8060:8060"
      - "9117:9117"
    networks:
      - subject-net

networks:
  subject-net:
    driver: bridge
