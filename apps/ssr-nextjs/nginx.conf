log_format custom '$remote_addr - $remote_user [$time_local] '
  '"$request" $status $body_bytes_sent $request_length '
  '"$http_referer" "$http_user_agent" '
  'rt=$request_time uct=$upstream_connect_time '
  'uht=$upstream_header_time urt=$upstream_response_time';

upstream nextjs_server {
  server next-app:3000;
  keepalive 1024;
  keepalive_requests 1000000;
  keepalive_timeout 300s;
}

server {
  listen 80;
  server_name localhost;

  access_log  /var/log/nginx/access.log custom buffer=256k flush=1s;
  error_log   /var/log/nginx/error.log;

  location / {
    proxy_pass http://nextjs_server;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl backlog=65535 reuseport;
  http2 on;
  server_name localhost;

  ssl_certificate     /etc/nginx/ssl/cert.pem;
  ssl_certificate_key /etc/nginx/ssl/key.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_session_cache   shared:SSL:200m;
  ssl_session_timeout 4h;

  access_log  /var/log/nginx/access.log custom buffer=256k flush=1s;
  error_log   /var/log/nginx/error.log;

  location / {
    proxy_pass http://nextjs_server;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 8060;
  server_name 127.0.0.1;

  location /nginx_status {
    stub_status on;
    access_log off;
  }
}