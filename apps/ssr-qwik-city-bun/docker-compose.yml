services:
  qwik-app-bun:
    build:
      context: .
      target: runner
    image: ssr-qwik-city-bun-app
    restart: unless-stopped
    networks:
      - app-net

  nginx:
    build:
      context: .
      target: nginx
    image: ssr-qwik-city-bun-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8060:8060"
    depends_on:
      - qwik-app-bun
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
