services:
  analog-app:
    build: .
    image: ssr-analogjs-app
    restart: unless-stopped
    networks:
      - app-net

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: ssr-analogjs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8060:8060"
    depends_on:
      - analog-app
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
