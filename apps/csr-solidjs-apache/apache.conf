ServerTokens Prod
ServerSignature Off
UseCanonicalName Off
HostnameLookups Off
Timeout 30
KeepAlive On
KeepAliveTimeout 300
MaxKeepAliveRequests 100000

# Listen on required ports
Listen 443
Listen 8060

# Big SYN backlog — match nginx `backlog=65535`
ListenBacklog 65535

# Enable SO_REUSEPORT-style listener buckets (event MPM)
ListenCoresBucketsRatio 8

# ExtendedStatus adds per-request overhead — keep off for capacity tests.
ExtendedStatus Off

# Modules (status_module already loaded by base httpd.conf)
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
LoadModule http2_module modules/mod_http2.so
LoadModule filter_module modules/mod_filter.so
LoadModule deflate_module modules/mod_deflate.so

<IfModule mod_deflate.c>
    DeflateCompressionLevel 4
    AddOutputFilterByType DEFLATE text/plain
    AddOutputFilterByType DEFLATE text/html
    AddOutputFilterByType DEFLATE text/xml
    AddOutputFilterByType DEFLATE text/css
    AddOutputFilterByType DEFLATE application/xml
    AddOutputFilterByType DEFLATE application/xhtml+xml
    AddOutputFilterByType DEFLATE application/rss+xml
    AddOutputFilterByType DEFLATE application/javascript
    AddOutputFilterByType DEFLATE application/x-javascript
    AddOutputFilterByType DEFLATE application/json
    AddOutputFilterByType DEFLATE image/svg+xml
</IfModule>

# Big TLS session cache
SSLSessionCache shmcb:logs/ssl_scache(67108864)
SSLSessionCacheTimeout 14400
SSLSessionTickets On
SSLUseStapling Off

# Sendfile / mmap on for static delivery
EnableSendfile On
EnableMMAP On

LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" rt=%D" custom

# --- Port 80 ---
<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /usr/local/apache2/htdocs
    DirectoryIndex index.html

    # Logging off for capacity tests
    # CustomLog /var/log/apache2/access.log custom
    ErrorLog /var/log/apache2/error.log
    LogLevel crit

    <Directory "/usr/local/apache2/htdocs">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>
</VirtualHost>

# --- Port 443 ---
<VirtualHost *:443>
    ServerName localhost
    DocumentRoot /usr/local/apache2/htdocs
    DirectoryIndex index.html

    SSLEngine on
    SSLCertificateFile /usr/local/apache2/ssl/cert.pem
    SSLCertificateKeyFile /usr/local/apache2/ssl/key.pem
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLHonorCipherOrder off
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305

    Protocols h2 http/1.1
    H2MaxSessionStreams 100
    H2MaxWorkers 64

    # CustomLog /var/log/apache2/access.log custom
    ErrorLog /var/log/apache2/error.log
    LogLevel crit

    <Directory "/usr/local/apache2/htdocs">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>
</VirtualHost>

# --- Status (port 8060) ---
<VirtualHost *:8060>
    ServerName 127.0.0.1

    <Location /server-status>
        SetHandler server-status
        Require local
        Require ip 127.0.0.1
    </Location>

    ErrorLog /var/log/apache2/status_error.log
    LogLevel error
</VirtualHost>