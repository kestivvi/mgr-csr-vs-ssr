services:
  next-app-bun:
    build:
      context: .
      target: runner
    image: ssr-nextjs-bun-app
    restart: unless-stopped
    networks:
      - app-net
    deploy:
      resources:
        limits:
          memory: 1536M


  nginx:
    build:
      context: .
      target: nginx
    image: ssr-nextjs-bun-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8060:8060"
    depends_on:
      - next-app-bun
    networks:
      - app-net

networks:
  app-net:
    driver: bridge