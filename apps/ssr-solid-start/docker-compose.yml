services:
  solid-app:
    build:
      context: .
      target: runner
    image: ssr-solid-start-app
    restart: unless-stopped
    networks:
      - app-net

  nginx:
    build:
      context: .
      target: nginx
    image: ssr-solid-start-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8060:8060"
    depends_on:
      - solid-app
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
