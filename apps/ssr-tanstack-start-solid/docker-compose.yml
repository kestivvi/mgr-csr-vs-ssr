services:
  tanstack-solid-app:
    build:
      context: .
      target: runner
    image: ssr-tanstack-start-solid-app
    restart: unless-stopped
    networks:
      - app-net

  nginx:
    build:
      context: .
      target: nginx
    image: ssr-tanstack-start-solid-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8060:8060"
    depends_on:
      - tanstack-solid-app
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
