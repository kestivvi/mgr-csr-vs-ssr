services:
  nginx:
    build:
      context: ../../${APP_DIR}
      target: ${BUILD_TARGET}
      additional_contexts:
        infra: ../nginx
    image: mgr-${APP_ID}-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8060:8060"
    networks:
      - app-net
    environment:
      - NGINX_TEMPLATE=/etc/nginx/conf.d/default.csr.conf.template

networks:
  app-net:
    driver: bridge
