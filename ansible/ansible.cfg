[defaults]
roles_path = roles
# --- User Settings ---
inventory = inventory.yml
remote_user = ec2-user
# For Frankfurt region (eu-central-1)
# private_key_file = ~/.ssh/MGR1.pem
# For Mumbai region (ap-south-1)
private_key_file = ~/.ssh/MGR-M.pem
host_key_checking = False

# --- Parallelism & Speed Settings ---
forks = 100
# Enable smart gathering and fact caching to save time
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_fact_cache
fact_caching_timeout = 86400

# --- Recommended Logging Improvements ---
# Use the 'yaml' callback for cleaner, more readable output.
stdout_callback = yaml
# Hide skipped tasks to reduce clutter.
display_skipped_hosts = no
# Hide deprecation warnings for a cleaner run.
deprecation_warnings = False

[inventory]
transform_invalid_group_chars = underscore

[ssh_connection]
# Drastically speeds up execution by reducing SSH operations
pipelining = True
# Re-use SSH connections for the duration of the experiment
ssh_args = -o ControlMaster=auto -o ControlPersist=30m