---
- name: Emergency Disk Cleanup (Fix for full disks)
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Clean up temporary build directories to free space
      ansible.builtin.shell: rm -rf /tmp/wrk /tmp/openssl* /tmp/ansible*
      changed_when: false

- name: Configure All Servers (Common baseline)
  hosts: all
  become: true
  roles:
    - common

- name: Configure Load Generators
  hosts: role_load_generators
  become: true
  roles:
    - load_generator_tuning

- name: Configure All Application Servers
  hosts: role_application_servers
  become: true
  roles:
    - application_server
    - cadvisor

- name: Configure Monitoring Host
  hosts: role_monitoring_host
  become: true
  roles:
    - monitoring_host
